version: "3.8"

services:
  marketsnap-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-marketsnap-bot
    
    # Automatically start on boot and restart if crashes
    restart: unless-stopped

    # Load environment variables
    env_file:
      - .env

    # Persist database and logs
    volumes:
      - ./marketsnap.db:/app/marketsnap.db
      - ./logs:/app/logs

    # Resource limits (works on normal docker compose)
    mem_limit: 512m
    mem_reservation: 128m

    # Prevent zombie processes
    init: true

    # Optional: reduce log size (very useful on Raspberry Pi)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # If your bot needs network access only
    network_mode: bridge

    # Optional: always keep STDOUT open
    tty: true
version: "3.8"

services:
  marketsnap-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-marketsnap-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist SQLite database
      - ./marketsnap.db:/app/marketsnap.db
      # Persist logs
      - ./logs:/app/logs
    # Optional: limit resources for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
